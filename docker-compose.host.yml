# Linux: host networking so Rust can use any game/RCON/query ports from the UI without huge
# port ranges. Dockge will not show a clickable panel port (no published mappings); open
# http://<host>:3001 manually (or set PORT in environment if you change it).
#
#   docker compose -f docker-compose.yml -f docker-compose.host.yml up -d
#
# Default docker-compose.yml uses bridge + published 3001 so Dockge shows the panel link.
# Merge this file when you need external Rust connectivity without listing hundreds of ports.

services:
  oxidized-core:
    network_mode: host
