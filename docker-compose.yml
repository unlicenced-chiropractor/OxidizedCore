services:
  oxidized-core:
    image: sortedsheep/oxidized-core:latest
    container_name: oxidized-core
    restart: unless-stopped

    ports:
      - "${OXIDIZED_PORT:-3001}:3001"

    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: "3001"
      SQLITE_PATH: /data/oxidized.db
      TRUST_PROXY: "${TRUST_PROXY:-0}"
      DOCKER_IMAGE_REPO: "sortedsheep/oxidized-core"
      DOCKER_IMAGE_TAG: "latest"
      # Optional for exact update checks (set to running image digest).
      # DOCKER_IMAGE_DIGEST: "sha256:..."

    volumes:
      - ./oxidized-core-data:/data
